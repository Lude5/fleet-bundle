<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Admin — Lude</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #131319;
  --surface-2: #1c1c25;
  --border: rgba(255,255,255,0.08);
  --border-bright: rgba(255,255,255,0.18);
  --text: #f4f4f5;
  --muted: #8b8b95;
  --accent: #6366f1;
  --accent-2: #8b5cf6;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --font: 'Inter', sans-serif;
  --mono: 'Space Grotesk', monospace;
}
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }

/* Login */
.login-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  padding: 32px;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px; max-width: 380px; width: 100%;
  text-align: center;
}
.login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
.login-box p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 14px 16px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 10px; color: var(--text);
  font-size: 14px; font-family: var(--font); outline: none; margin-bottom: 12px;
  transition: border-color 0.2s;
}
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  width: 100%; padding: 14px; background: var(--accent); color: white;
  border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.2s; font-family: var(--font);
}
.login-box button:hover { background: #4f46e5; }
.login-error { color: var(--red); font-size: 12px; margin-top: 12px; }
body.authed .login-overlay { display: none; }

/* Header */
.header {
  padding: 24px 32px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px); z-index: 50;
}
.brand {
  font-family: var(--mono); font-size: 14px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
}
.brand .accent { color: var(--accent); }
.header-actions { display: flex; gap: 12px; align-items: center; }
.refresh-btn {
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; font-family: var(--font); font-weight: 500;
}
.refresh-btn:hover { border-color: var(--border-bright); }
.refresh-btn.spinning::before { animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.logout-btn { color: var(--muted); font-size: 11px; cursor: pointer; }
.logout-btn:hover { color: var(--text); }

/* Container */
.container { max-width: 1400px; margin: 0 auto; padding: 32px; }

/* Stats overview */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}
.stat-label {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; font-weight: 600; margin-bottom: 8px;
}
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* Section header */
.section-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 16px;
}
.section-title { font-size: 18px; font-weight: 700; }
.section-meta { font-size: 12px; color: var(--muted); }

/* Site cards */
.sites { display: grid; gap: 16px; }
.site {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 0; overflow: hidden;
  transition: border-color 0.2s;
}
.site:hover { border-color: var(--border-bright); }
.site-header {
  padding: 20px 24px; display: flex; justify-content: space-between;
  align-items: center; gap: 20px;
}
.site-info { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
.site-favicon {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 700; font-size: 16px; color: #fff;
}
.site-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.site-url { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.site-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 100px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-live { background: rgba(34,197,94,0.1); color: var(--green); }
.status-live .status-dot { background: var(--green); }
.status-down { background: rgba(239,68,68,0.1); color: var(--red); }
.status-down .status-dot { background: var(--red); }
.status-checking { background: rgba(245,158,11,0.1); color: var(--orange); }
.status-checking .status-dot { background: var(--orange); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.3; } }

.site-body {
  padding: 0 24px 20px; display: grid;
  grid-template-columns: 1fr 1fr 1fr; gap: 12px;
}
.site-stat {
  background: var(--surface-2); border-radius: 8px; padding: 12px 14px;
}
.site-stat-label {
  font-size: 10px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; font-weight: 600; margin-bottom: 4px;
}
.site-stat-val { font-size: 16px; font-weight: 700; }

.site-actions {
  display: flex; gap: 8px; padding: 16px 24px;
  border-top: 1px solid var(--border); align-items: center;
  flex-wrap: wrap;
}
.action-btn {
  flex: 1; min-width: 130px;
  padding: 10px 14px; border: 1px solid var(--border);
  background: var(--surface-2); color: var(--text);
  border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.15s; font-family: var(--font);
}
.action-btn:hover { border-color: var(--border-bright); background: #232330; }
.action-btn.primary {
  background: var(--accent); border-color: var(--accent); color: white;
}
.action-btn.primary:hover { background: #4f46e5; border-color: #4f46e5; }

.password-row {
  padding: 14px 24px; background: var(--surface-2);
  display: flex; align-items: center; gap: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px;
}
.password-label {
  color: var(--muted); font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: 1px;
}
.password-value {
  font-family: var(--mono); flex: 1;
  font-weight: 600; letter-spacing: 0.5px;
}
.password-blurred { filter: blur(5px); transition: filter 0.2s; }
.password-row:hover .password-blurred { filter: blur(0); }
.copy-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 6px 12px; border-radius: 6px;
  font-size: 10px; font-weight: 600; cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.copy-btn:hover { border-color: var(--border-bright); }
.copy-btn.copied { background: var(--green); color: white; border-color: var(--green); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  background: var(--surface); border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 10px; font-size: 13px;
  transform: translateY(80px); opacity: 0; transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 768px) {
  .header { padding: 16px 20px; }
  .container { padding: 20px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .site-body { grid-template-columns: 1fr; }
  .action-btn { min-width: 100%; }
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>Master Admin</h1>
    <p>Enter password to access dashboard</p>
    <input type="password" id="loginPw" placeholder="Password" autofocus>
    <button onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<header class="header">
  <div class="brand">LUDE <span class="accent">// MASTER</span></div>
  <div class="header-actions">
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
      <span>↻</span> Refresh
    </button>
    <span class="logout-btn" onclick="logout()">Logout</span>
  </div>
</header>

<div class="container">
  <!-- Overall stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Sites</div>
      <div class="stat-value" id="totalSites">—</div>
      <div class="stat-sub">Active deployments</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Products</div>
      <div class="stat-value" id="totalProducts">—</div>
      <div class="stat-sub">Across all sites</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Live</div>
      <div class="stat-value" id="liveSites" style="color:var(--green);">—</div>
      <div class="stat-sub">Responding to requests</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Down</div>
      <div class="stat-value" id="downSites" style="color:var(--red);">—</div>
      <div class="stat-sub">Need attention</div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">Client Sites</div>
    <div class="section-meta" id="lastRefresh"></div>
  </div>

  <div class="sites" id="sitesList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const MASTER_PASSWORD = 'lude2026';

const SITES = [
  {
    id: 'jake',
    name: 'Kakobuy.Locker',
    url: 'https://kakobuy.locker',
    backupUrl: 'https://jakes-finds.onrender.com',
    adminUrl: 'https://kakobuy.locker/admin',
    password: 'jakeisgay',
    favicon: 'K',
    color: '#e63946',
    description: 'KakoBuy affiliate, Meta ads running'
  },
  {
    id: 'tobey',
    name: 'JoyaFinds',
    url: 'https://joyafinds.onrender.com',
    backupUrl: 'https://joyafinds.onrender.com',
    adminUrl: 'https://joyafinds.onrender.com/admin',
    password: 'changeme123',
    favicon: 'J',
    color: '#c8e619',
    description: 'JoyaGoo finds, dark theme'
  },
  {
    id: 'reptools',
    name: 'RepTools',
    url: 'https://rep.tools',
    backupUrl: 'https://rep.tools',
    adminUrl: 'https://rep.tools/admin',
    password: '—',
    favicon: 'R',
    color: '#06b6d4',
    description: 'Main brand site, 10k+ products'
  },
  {
    id: 'john',
    name: 'MrPutYouOnFinds',
    url: 'https://puttingyouon.onrender.com',
    backupUrl: 'https://puttingyouon.onrender.com',
    adminUrl: 'https://puttingyouon.onrender.com/admin',
    password: 'changeme123',
    favicon: 'M',
    color: '#a855f7',
    description: 'Work in progress'
  }
];

function doLogin() {
  const pw = document.getElementById('loginPw').value;
  if (pw === MASTER_PASSWORD) {
    sessionStorage.setItem('master_authed', '1');
    document.body.classList.add('authed');
    loadSites();
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password';
  }
}

document.getElementById('loginPw').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});

function logout() {
  sessionStorage.removeItem('master_authed');
  document.body.classList.remove('authed');
  document.getElementById('loginPw').value = '';
}

if (sessionStorage.getItem('master_authed') === '1') {
  document.body.classList.add('authed');
  loadSites();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyPw(pw, btn) {
  navigator.clipboard.writeText(pw).then(() => {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  });
}

async function fetchSiteStats(site) {
  // Try to fetch product count from the API
  try {
    const r = await fetch(site.backupUrl + '/api/products?limit=1', { mode: 'cors' });
    if (r.ok) {
      return { status: 'live', products: null };
    }
    return { status: 'down', products: null };
  } catch (e) {
    return { status: 'down', products: null };
  }
}

async function loadSites() {
  const sitesList = document.getElementById('sitesList');
  sitesList.innerHTML = '';

  let liveCount = 0;
  let downCount = 0;

  for (const site of SITES) {
    const card = document.createElement('div');
    card.className = 'site';
    card.innerHTML = `
      <div class="site-header">
        <div class="site-info">
          <div class="site-favicon" style="background:${site.color};">${site.favicon}</div>
          <div style="flex:1;min-width:0;">
            <div class="site-name">${site.name}</div>
            <div class="site-url">${site.url.replace(/^https?:\/\//, '')}</div>
          </div>
        </div>
        <div class="site-status status-checking" id="status-${site.id}">
          <span class="status-dot"></span>
          Checking…
        </div>
      </div>
      <div class="site-body">
        <div class="site-stat">
          <div class="site-stat-label">Products</div>
          <div class="site-stat-val" id="products-${site.id}">—</div>
        </div>
        <div class="site-stat">
          <div class="site-stat-label">Status</div>
          <div class="site-stat-val" id="status-text-${site.id}">—</div>
        </div>
        <div class="site-stat">
          <div class="site-stat-label">Notes</div>
          <div class="site-stat-val" style="font-size:12px;font-weight:500;color:var(--muted);">${site.description}</div>
        </div>
      </div>
      <div class="site-actions">
        <a class="action-btn primary" href="${site.adminUrl}" target="_blank">→ Admin Panel</a>
        <a class="action-btn" href="${site.url}" target="_blank">View Site</a>
        <a class="action-btn" href="${site.adminUrl}/analytics" target="_blank">Analytics</a>
        <a class="action-btn" href="${site.adminUrl}/products" target="_blank">Manage Products</a>
      </div>
      <div class="password-row">
        <span class="password-label">Password:</span>
        <span class="password-value password-blurred">${site.password}</span>
        <button class="copy-btn" onclick="copyPw('${site.password}', this)">Copy</button>
      </div>
    `;
    sitesList.appendChild(card);
  }

  // Update overall counts as sites check in
  document.getElementById('totalSites').textContent = SITES.length;

  // Check each site
  for (const site of SITES) {
    const stats = await fetchSiteStats(site);
    const statusEl = document.getElementById(`status-${site.id}`);
    const statusTextEl = document.getElementById(`status-text-${site.id}`);

    if (stats.status === 'live') {
      liveCount++;
      statusEl.className = 'site-status status-live';
      statusEl.innerHTML = '<span class="status-dot"></span>Live';
      statusTextEl.textContent = 'Online';
      statusTextEl.style.color = 'var(--green)';
    } else {
      downCount++;
      statusEl.className = 'site-status status-down';
      statusEl.innerHTML = '<span class="status-dot"></span>Down';
      statusTextEl.textContent = 'Unreachable';
      statusTextEl.style.color = 'var(--red)';
    }

    document.getElementById('liveSites').textContent = liveCount;
    document.getElementById('downSites').textContent = downCount;
  }

  document.getElementById('lastRefresh').textContent =
    'Last refresh: ' + new Date().toLocaleTimeString();
}

function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  loadSites().finally(() => btn.classList.remove('spinning'));
}
</script>

</body>
</html>
