<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · {{ site.name }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #141416;
            --surface-2: #1c1c20;
            --border: {{ site.brand_color }}40;
            --border-subtle: rgba(255,255,255,0.07);
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.65);
            --text-muted: rgba(255,255,255,0.38);
            --accent: {{ site.brand_color }};
            --accent-hover: {{ site.brand_color }}dd;
            --accent-dim: {{ site.brand_color }}1a;
            --accent-glow: {{ site.brand_color }}33;
            --danger: #ef4444;
            --font-display: 'Anton', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'Space Grotesk', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        /* Subtle accent glow background */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }
        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .brand {
            margin-bottom: 32px;
        }
        .brand .name {
            font-family: var(--font-display);
            font-size: 38px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1;
        }
        .brand .name .accent { color: var(--accent); }
        .brand .badge {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-top: 12px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }
        .card h1 {
            font-family: var(--font-display);
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .card .sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }
        .field {
            text-align: left;
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color .15s, background .15s;
        }
        .field input:focus { border-color: var(--accent); background: rgba(28,28,32,0.85); }
        .field input::placeholder { color: var(--text-muted); }
        .submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, transform .1s, box-shadow .15s;
            box-shadow: 0 8px 24px var(--accent-glow);
        }
        .submit:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 12px 32px var(--accent-glow); }
        .submit:active { transform: translateY(0); }
        .err {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-align: left;
        }
        .foot {
            margin-top: 24px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .foot a { color: var(--text-secondary); text-decoration: none; }
        .foot a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="brand">
            <div class="name">{{ site.name_part1 }}<span class="accent">{{ site.name_part2 }}</span></div>
            <span class="badge" data-i18n="login_badge">Admin Panel</span>
        </div>
        <div class="card">
            <h1 data-i18n="login_signin">Sign in</h1>
            <p class="sub" data-i18n="login_restricted">Restricted access</p>
            {% if error %}<div class="err">{{ error }}</div>{% endif %}
            <form method="POST">
                <div class="field">
                    <label for="pw" data-i18n="login_password">Password</label>
                    <input id="pw" type="password" name="password" placeholder="••••••••••••" required autofocus autocomplete="current-password">
                </div>
                <button class="submit" type="submit" data-i18n="login_button">Sign In</button>
            </form>
        </div>
        <p class="foot">
            <a href="/" data-i18n="login_back">&larr; Back to site</a>
            <span style="margin:0 8px;color:var(--text-muted);">·</span>
            <button type="button" onclick="setAdminLang(localStorage.getItem('admin_lang')==='zh'?'en':'zh');" style="background:none;border:none;color:var(--text-secondary);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;">EN / 中文 · <span data-lang-label style="color:var(--accent);">EN</span></button>
        </p>
    </div>
    <script src="/static/js/admin_i18n.js" defer></script>
</body>
</html>
